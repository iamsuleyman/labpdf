<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Lab Report PDF Generator</title>
  <script src="jspdf.umd.min.js"></script>
  <script src="jspdf.plugin.autotable.min.js"></script>
  <style>
    body { font-family: Arial, sans-serif; margin: 20px; background: #f5f5f5; }
    button { padding: 12px 24px; font-size: 16px; cursor: pointer; background: #0072CE; color: #fff; border: none; border-radius: 4px; }
    button:hover { background: #005fa3; }
    iframe { width: 100%; height: 90vh; border: 1px solid #ccc; margin-top: 16px; }
  </style>
</head>
<body>
  <button onclick="generate()">Generate PDF</button>
  <iframe id="preview"></iframe>
  <script src="fonts.js"></script>
  <script src="generatePDF.js"></script>
  <script>
    async function generate() {
      const resp = await fetch('sample/data.json');
      const data = await resp.json();
      const url = generatePDF(data);
      document.getElementById('preview').src = url;
    }
  </script>
</body>
</html>
